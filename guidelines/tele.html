<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hospital Directory</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-bg: #eff6ff;
            --primary-border: #bfdbfe;
            --surface: #ffffff;
            --bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --header-bg: #1e293b;
            --divider: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            line-height: 1.5;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            color: var(--header-bg);
            margin-top: 10px;
            margin-bottom: 24px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            overflow: hidden;
            border: 1px solid var(--divider);
        }

        .card-header {
            background-color: var(--header-bg);
            color: white;
            padding: 14px 16px;
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .group {
            padding: 16px;
            border-bottom: 4px solid var(--bg);
        }

        .group:last-child {
            border-bottom: none;
        }

        .group-title {
            margin: 0 0 16px 0;
            font-size: 1.05rem;
            color: var(--text-main);
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .group-title small {
            color: var(--text-muted);
            font-weight: normal;
            font-size: 0.85rem;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--divider);
            gap: 16px;
        }

        .row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .row:first-of-type {
            padding-top: 0;
        }

        .label {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .label small {
            display: block;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 2px;
            font-weight: normal;
        }

        .numbers {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-end;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary-bg);
            color: var(--primary);
            border: 1px solid var(--primary-border);
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            text-align: center;
            min-width: 100px;
            transition: background-color 0.2s;
        }

        .btn:active {
            background-color: #dbeafe;
        }

        /* Simple lists without group headers */
        .simple-list .row:first-of-type {
            padding-top: 16px;
        }
        .simple-list .row {
            padding: 16px;
        }
    </style>
</head>
<body>

    <h1>Hospital Directory</h1>

    <div class="container">

        <div class="card">
            <h2 class="card-header">Wards</h2>
            
            <div class="group">
                <h3 class="group-title">Toghill</h3>
                <div class="row">
                    <span class="label">Dr office</span>
                    <div class="numbers"><a href="tel:01159691169,73422" class="btn">73422</a></div>
                </div>
                <div class="row">
                    <span class="label">Nursing station</span>
                    <div class="numbers">
                        <a href="tel:01159691169,74682" class="btn">74682</a>
                        <a href="tel:01159691169,73419" class="btn">73419</a>
                        <a href="tel:01159691169,74681" class="btn">74681</a>
                    </div>
                </div>
